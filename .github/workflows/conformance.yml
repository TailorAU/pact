name: PACT Conformance

# Track T10 (docs/v2-plan.yaml): a conformance gate that runs on every spec/ PR.
# Today this is scaffold-stage — it validates the test-vector format and the
# conformance directory layout, and runs any test vectors that exist. As the
# T1/T2/T7 normative tracks land their smoke tests under
# spec/v2.0/conformance/{core,extended,...}/*.yaml, this workflow runs them too.

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - '.github/workflows/conformance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'spec/**'
      - '.github/workflows/conformance.yml'

permissions:
  contents: read

jobs:
  conformance-scaffold:
    name: Conformance scaffold checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install YAML tooling
        run: npm install -g js-yaml

      - name: Conformance directory exists
        run: |
          test -d spec/v2.0/conformance || { echo "spec/v2.0/conformance/ missing"; exit 1; }
          test -f spec/v2.0/conformance/README.md || { echo "conformance README missing"; exit 1; }
          test -f spec/v2.0/conformance/test-vector-format.yaml || { echo "test-vector-format.yaml missing"; exit 1; }
          echo "Conformance scaffold present."

      - name: Test-vector format file parses as YAML
        run: |
          node -e "require('js-yaml').load(require('fs').readFileSync('spec/v2.0/conformance/test-vector-format.yaml','utf8')); console.log('test-vector-format.yaml OK');"

      - name: Build & run the conformance runner (verification vectors)
        # Runs spec/v2.0/conformance/runner against all vectors under
        # spec/v2.0/conformance/. kind:verification vectors execute fully;
        # kind:http vectors SKIP without --server (CI doesn't run a PACT server).
        # See spec/v2.0/conformance/runner/README.md for what's covered vs TODO.
        working-directory: spec/v2.0/conformance/runner
        run: |
          npm ci || npm install
          npm run build
          node dist/index.js run --vectors ..
