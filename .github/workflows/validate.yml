name: Validate Specification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JSON Schema validator
        run: npm install -g ajv-cli ajv-formats

      - name: Validate v0.4 schemas
        run: |
          echo "Validating v0.4 JSON schemas..."
          for schema in spec/v0.4/schemas/*.json; do
            echo "  Checking $schema"
            ajv compile -s "$schema" --spec=draft7 -c ajv-formats || exit 1
          done
          echo "All v0.4 schemas valid."

      - name: Validate v0.3 schemas
        run: |
          echo "Validating v0.3 JSON schemas..."
          for schema in spec/v0.3/schemas/*.json; do
            echo "  Checking $schema"
            ajv compile -s "$schema" --spec=draft7 -c ajv-formats || exit 1
          done
          echo "All v0.3 schemas valid."

      - name: Validate v1.0, v1.1 schemas (draft-07)
        run: |
          for version in v1.0 v1.1; do
            if [ -d "spec/$version/schemas" ]; then
              echo "Validating $version JSON schemas..."
              for schema in spec/$version/schemas/*.json; do
                echo "  Checking $schema"
                ajv compile -s "$schema" --spec=draft7 -c ajv-formats || exit 1
              done
              echo "All $version schemas valid."
            fi
          done

      - name: Validate v2.0 schemas (JSON Schema 2020-12)
        # v2.0 schemas are bumped to https://json-schema.org/draft/2020-12/schema.
        # Older versions (v0.3/v0.4/v1.0/v1.1) stay on draft-07 (frozen for citation stability).
        run: |
          if [ -d spec/v2.0/schemas ]; then
            echo "Validating v2.0 JSON schemas (draft 2020-12)..."
            # v2.0.3 introduced cross-schema $refs (e.g. fabric-manifest ->
            # pending-obligation, *-request -> authorization-proof). ajv-cli
            # compiles one -s schema in isolation, so every sibling that a
            # schema may $ref MUST be registered with -r or the ref is
            # unresolvable. Register all OTHER v2.0 schemas as references
            # (excluding self to avoid an ajv duplicate-$id error).
            for schema in spec/v2.0/schemas/*.json; do
              echo "  Checking $schema"
              refs=""
              for other in spec/v2.0/schemas/*.json; do
                if [ "$other" != "$schema" ]; then
                  refs="$refs -r $other"
                fi
              done
              ajv compile -s "$schema" $refs --spec=draft2020 -c ajv-formats || exit 1
            done
            echo "All v2.0 schemas valid."
          fi

  check-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in Markdown
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Lint specification files
        run: markdownlint '**/*.md' --ignore node_modules --config .markdownlint.json || true

  build-packages:
    name: Build CLI and MCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build @pact-protocol/cli
        working-directory: cli
        run: |
          npm ci
          npm run build
          npm run typecheck

      - name: Build @pact-protocol/mcp
        working-directory: mcp
        run: |
          npm ci
          npm run build
          npm run typecheck
