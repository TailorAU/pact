    mitigation: GitHub Actions only; no external CI; community-runnable locally
  - id: R5
    risk: Multiple parallel tracks overwhelm sole-maintainer review bandwidth
    mitigation: Phase gates serialise high-context work; T1/T2/T10 in phase 0 are mechanical promotions
  - id: R6
