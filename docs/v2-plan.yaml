# PACT v2 — planning handoff
# Machine-readable working plan. Not normative; not spec text.
# Edit inline; promote sections to spec/v2.0/SPECIFICATION.md when they converge.
#
# Revision 2 (2026-05-12): incorporates cold-eye review feedback.
# Changes: T3/T6 disambiguated; T7 promoted to phase 0; conformance scaffold
# moved to phase 0 via T10; mediator-presence elevated to D5; DID adoption
# elevated to D6; hostile-operator-transfer added to T7; T11 added for
# reference CLI/MCP; GDPR/RTBF and event-log retention added; federation
# constraints made explicit.

plan:
  spec: PACT
  version: "2.0"
  status: draft-planning — D1-D6 RESOLVED; spec/v2.0/ created by collapsing main's v1.2-draft; phase 0 underway
  revision: 4   # rev4 (2026-05-13): v1.2-draft collapsed into spec/v2.0/; HumanPrincipal corrected to STRICTLY 1:1 (per #4 + Knox); §18 first-class types narrowed to fido2-assertion + voice-biometric; conformance scaffold now lives in spec/v2.0/conformance/
  predecessor:
    stable: v1.1
    collapsed_from: main's spec/v1.2/SPECIFICATION.md (the canonical 1:1 draft) — git mv'd to spec/v2.0/ on 2026-05-13. The stale `v1.2` branch (which carried a superseded 1:N approach) is NOT the source — it is left untouched as a relic.
  drafted: 2026-05-12
  author: Knox Hart + AI   # final spec-of-record requires per-section human attribution (cutover criterion)
  source_threads:
    - conversation 2026-05-12 (Knox + AI design discussion)
    - conversation 2026-05-12 (cold-eye review pass)
    - https://github.com/TailorAU/pact/issues/3   # voice-biometric RFC
    - https://github.com/TailorAU/pact/issues/4   # HumanPrincipal cardinality — resolved STRICTLY 1:1
    - https://github.com/TailorAU/pact/issues/13  # AloomU production feedback

goals:
  - Promote v1.2-draft additions (Human Authorization Layer, attestation formats, HumanPrincipal — strictly 1:1) to normative
  - Land the voice-biometric attestation type (RFC #3) as a first-class format
  - Introduce ephemeral negotiation Sessions with handler-signed Mandates as a new mode
  - Resolve production gaps surfaced by AloomU deployment (issue #13)
  - Tighten conformance tiering and publish a conformance test suite

non_goals:
  - Cross-implementation federation across Tailor/Source/Baink — deferred to v2.1+ (see federation_constraints)
  - Backwards-incompatible changes to the v1.1 resource model — additive only
  - New built-in resource types beyond v1.1 (document, transaction, fact, record)

federation_constraints:
  # Federation is a v2.1+ non-goal, but v2 primitives MUST NOT preclude it.
  rule_1: Agent identities SHOULD be portable URN-style globally unique IDs, even if v2 servers treat them as server-local
  rule_2: Principal registry format (T1) SHOULD support cross-server resolution via DID or analogous URI scheme
  rule_3: Session outcome transcripts SHOULD be portable (canonical JSON, no server-internal references)
  owned_by: T7 enforces these constraints across the spec

tracks:

  - id: T1
    name: Human Authorization Layer (normative)
    decision_status: |
      D4=A — define Authorization-Required conformance tier normatively in v2 (no launch impl required to satisfy it).
      D6=A — adopt W3C DIDs as principal identity layer; did:web + did:key REQUIRED at v2; did:ion/did:ethr/etc. optional.
    rationale: |
      Promote v1.2 §17 from draft to normative. v1.1 has no proof-of-human-intent
      primitive; v2 makes it the standard envelope for cross-org messages.
    inputs:
      - spec/v2.0/SPECIFICATION.md §17 (collapsed from main's spec/v1.2/SPECIFICATION.md — the canonical 1:1 version, not the stale v1.2-branch 1:N draft)
      - issue #4 (HumanPrincipal cardinality — resolved STRICTLY 1:1; multi-persona handled above the PACT layer)
    status: NORMATIVE TEXT LANDED 2026-05-13 — spec/v2.0/SPECIFICATION.md §17 (Human Authorization Layer, §17.1-17.12) is no longer a stub; synced from the canonical mirror via coordination PR TailorAU/tailor-app#1616. Re-sync if that PR's review changes anything.
    deliverables:
      - "[DONE] spec/v2.0/SPECIFICATION.md §17 — full normative text: 17.1 problem, 17.2 trust chain, 17.3 two-layer arch, 17.4 HumanPrincipal strictly-1:1 + DID identity, 17.5 the persona claim (above PACT layer), 17.6 the authorization_proof envelope, 17.7 verification flow, 17.8 credential registry + tombstone/erasure, 17.9 conformance incl. the defined Authorization-Required tier, 17.10 GDPR/RTBF position, 17.11 delegation (3-hop cap), 17.12 open questions"
      - "[DONE] spec/v2.0/schemas/authorization-proof.json — the §17.6 envelope + §18.1 common fields + inline voice-biometric additions; listed in Appendix A.2"
      - "[DONE] spec/v2.0/schemas/principal-registry.json — formalises /.well-known/pact-credentials.json (§17.8), incl. tombstone; listed in Appendix A.2"
      - example test vectors for the verification flow (→ spec/v2.0/conformance/) — STILL TODO
      - "[DONE] HumanPrincipal STRICTLY 1:1 (§17.4) — normative; the `persona` claim documented as above-PACT-layer advisory metadata (§17.5); HMAN multi-entity model demoted to a non-normative downstream reference"
      - Personal-data position for principal registry — cryptographic erasure via key destruction, tombstone semantics, or protocol-integrity exemption (rev2: GDPR/RTBF)
    conformance_impact:
      core: authorization_proof remains OPTIONAL — implementations MAY ignore
      extended: SHOULD support ≥1 attestation type and SHOULD verify when present
      new_tier:
        name: Authorization-Required
        requirement: MUST require authorization_proof on all cross-organisation messages
    migration_from_v1_1:
      - Implementations may add authorization_proof support incrementally — no breaking changes
      - v1.1 clients that ignore authorization_proof continue to interop at Core level
    resolves:
      - §17.9 Q1 credential enrollment → principal-registry.json (+ optional DID resolution pending D6)
      - §17.9 Q2 revocation propagation → eventually-consistent registry + max-age cache hint
    carries_forward:
      - Delegation depth — starting point 3 hops pending v2.1 implementation feedback (threat model: longer chains amplify revocation lag and reduce auditability)
      - Privacy / selective disclosure of authorization proofs
      - Personal-data treatment of authorization_proof in the event log (rev2)
      # NOTE (rev3): "cross-principal linkage trust decay" dropped — the 1:1 model has no cross-principal linkage. Trust-decay applies only to delegation chains (see delegation-depth item above).

  - id: T2
    name: Attestation Format Reference (normative + voice-biometric merge)
    rationale: Promote §18 to normative. Merge voice-biometric RFC #3 as a first-class type once HMAN PR lands.
    depends_on: [T1]
    inputs:
      - spec/v2.0/SPECIFICATION.md §18 (collapsed from main's spec/v1.2/§18 — defines two first-class types only)
      - issue #3 (voice-biometric, RFC accepted in principle, awaiting HMAN PR)
    status: NORMATIVE TEXT LANDED 2026-05-13 — spec/v2.0/SPECIFICATION.md §18 (§18.1-18.6) is no longer a stub; synced from the canonical mirror via PR TailorAU/tailor-app#1616. The voice-biometric crypto detail + test vectors remain deferred to HMAN's #3 PR (§18.6 lists them).
    deliverables:
      - "[DONE] spec/v2.0/SPECIFICATION.md §18 — 18.1 common envelope (+ comparison matrix), 18.2 fido2-assertion, 18.3 voice-biometric structural contract, 18.4 combining types, 18.5 custom types, 18.6 deferred-to-HMAN. Two v2.0 first-class types (fido2-assertion, voice-biometric); vc-jwt/biometric-hash/passphrase-signed demoted to custom types"
      - spec/v2.0/conformance/extended/attestation/ test vectors per first-class type (still TODO; voice-biometric vectors come with HMAN's #3 PR)
      - schemas/attestation/{fido2,voice-biometric}.json (still TODO)
    blocking_dependencies:
      - HMAN PR #3 must land before the voice-biometric §18 normative text is finalised
    open_questions:
      - Custom attestation types — pre-registration required, or just reverse-domain naming?

  - id: T3
    name: Ephemeral Negotiation Sessions + Mandate primitive (new)
    rationale: |
      New mode complementing the long-lived resource model. Two or more agents
      enter a sandboxed, time-bounded session with handler-signed Mandates
      defining their negotiating envelope. Matches the "phone call between
      agents" shape users actually want.

      Rev2: T3 is the canonical answer for NEW agent-to-agent ephemeral flows.
      Sidesteps self-approval (#13 Q1) by having no approval step at all.
      T6 (allowSelfApproval) is the fallback for legacy long-lived resource
      collaborations where Sessions don't fit.
    decision_status: |
      D3=A — Mandate lands NORMATIVELY in v2 (not deferred to v2.1). Demotable
        before v2 freeze if the T3 design review finds the primitive unstable.
      D5=A — Sessions are PEER-TO-PEER by default with an OPT-IN facilitator
        role. Always-mediated MediatedSession is NOT v2 core — parked as a
        v2.1 candidate if demand materialises.
    canonical_for: new agent-to-agent ephemeral negotiation
    depends_on: [T7]   # rev2: identity semantics must settle before Sessions design
    inputs:
      - conversation 2026-05-12 (Knox + AI design discussion)
      - issue #13 Q1, Q6, Q7
      - v1.2 §17 authorization_proof (Mandate generalises this)
    deliverables:
      - spec/v2.0/SPECIFICATION.md §19 PACT Sessions
      - spec/v2.0/SPECIFICATION.md §20 Mandate primitive
      - schemas/session-create-request.json
      - schemas/session-accept-request.json
      - schemas/mandate.json
      - schemas/session-outcome.json
      - REST endpoints:
        - POST /api/pact/sessions
        - POST /api/pact/sessions/{id}/accept
        - GET  /api/pact/sessions/{id}/state
        - POST /api/pact/sessions/{id}/close
        - GET  /api/pact/sessions/{id}/outcome
        - GET  /api/pact/sessions/{id}/transcript
      - Event types: pact.session.opened, pact.session.joined, pact.session.mandate-violation, pact.session.closed
      - Mandate enforcement reference algorithm
      - Facilitator role definition (see D5; opt-in third-party arbiter, not required for Sessions to function)
    primitive_shape:
      mandate:
        identity_claim: this agent represents handler X on topic Y
        constraint_envelope:
          may_publish: list of constraint categories the agent is permitted to assert
          must_respect: list of pre-loaded constraints the agent must observe
        commitment_authority: max binding decisions the agent may make alone
        disclosure_ceiling: max graduated-disclosure level (1–4) the agent may reveal
        escalation_hook: URI to notify when mandate is insufficient
        signature: handler signature over mandate body + session nonce
    conformance_impact:
      core: Sessions are OPTIONAL — Core implementations may run resource-only
      extended: SHOULD support Sessions; MUST enforce mandate envelopes if advertised
    open_questions:
      - Mandate revocation mid-session — immediate hang-up or finish-current-round?
      - Mandate intersection — refuse to open, or open with explicit deadlock outcome?
      - Outcome binding — advisory by default, opt-in "commitment" flag?
      - Carry-forward — sessions strictly islanded, or may reference predecessor?
      - Clock skew — session TTL is bounded by whose clock? (rev2)
      # Resolved-in-rev2: Mediator presence → see D5

  - id: T4
    name: Push-side delivery (webhooks + per-principal endpoints)
    rationale: |
      Closes #13 Q6 (AloomU production need: PagerDuty / Slack alerts) AND
      the local session-routing gap (escalations back to originating Claude
      Code session). Same primitive serves both: a registered endpoint per
      principal/registration receives a signed event push when matching
      events fire.
    depends_on: [T7]   # rev2: per-principal endpoints require stable principal IDs
    inputs:
      - issue #13 Q6
      - conversation 2026-05-12 (escalation routing back to originating session)
    deliverables:
      - spec/v2.0/SPECIFICATION.md §21 Push Delivery
      - schemas/subscription-create-request.json
      - schemas/event-delivery.json   # signed event envelope
      - REST endpoints:
        - POST   /api/pact/{resourceId}/subscriptions
        - GET    /api/pact/{resourceId}/subscriptions
        - DELETE /api/pact/{resourceId}/subscriptions/{id}
    delivery_semantics:
      guarantee: at-least-once
      signing: signed with sender's principal key (T1)
      idempotency: idempotency key per event
      retry: exponential backoff with jitter, max 24h then dead-letter
    conformance_impact:
      core: OPTIONAL
      extended: SHOULD support push delivery

  - id: T5
    name: Service-account auth (formalise BYOK scoped-key model)
    rationale: |
      Closes #13 Q2. v1.1's invite-token flow already returns a scoped apiKey
      suitable for daemons — but it's not documented as a first-class auth
      mode. v2 promotes it from "side effect of join-token" to a named
      pattern with clear lifecycle.
    inputs:
      - issue #13 Q2
      - v1.1 join-token flow
    deliverables:
      - spec/v2.0/SPECIFICATION.md §22 Service-Account Authentication
      - schemas/service-account-create-request.json
      - Lifecycle: create / rotate / revoke / scope-narrow
      - Scoping: per-resource, per-section, per-operation, per-mandate
      - REST endpoints:
        - POST   /api/pact/service-accounts
        - POST   /api/pact/service-accounts/{id}/rotate
        - DELETE /api/pact/service-accounts/{id}
    conformance_impact:
      core: OPTIONAL — implementations may continue with bearer/cookie auth
      extended: SHOULD support service-account auth for daemon agents

  - id: T6
    name: Approval policy & self-approval rule (legacy resource model fallback)
    rationale: |
      Rev2: T6 is the fallback for LEGACY long-lived resource collaborations
      where T3 Sessions don't fit. NEW agent-to-agent flows use T3 (no
      approval step). T6 documents the v1.1 invariant, makes it configurable
      for legacy cases, and recommends objection-based policy as the default
      for multi-agent-under-one-principal scenarios.
    canonical_for: legacy long-lived resource collaborations only
    status: DONE 2026-05-13 — spec/v2.0/SPECIFICATION.md §5 has the new "Self-approval" subsection. Mirror sync (tailor-app) folded into PR #1616.
    inputs:
      - issue #13 Q1
      - v1.1 §5 Approval Policy
    deliverables:
      - "[DONE] spec/v2.0/SPECIFICATION.md §5 — new 'Self-approval' subsection: by default an author's approval of their own proposal doesn't count (single/majority/unanimous); per-resource `allowSelfApproval` flag (default false); recommends `objection-based` for multi-agent-under-one-operator deployments; cross-references Sessions (§19-20) for new agent-to-agent flows"
    conformance_impact:
      core: behaviour unchanged; only prose tightens (the self-approval default is what implementations already do)
      extended: SHOULD expose allowSelfApproval via config API

  - id: T7
    name: Agent identity persistence & operator transfer (phase-0 foundation)
    rationale: |
      Rev2: Promoted to phase 0. Sessions (T3) negotiate between identities;
      push delivery (T4) targets per-principal endpoints. Identity semantics
      MUST be settled before either lands or they'll bake assumptions that
      conflict with the final identity model.

      Closes #13 Q7. Also owns the federation_constraints contract — identity
      design must not preclude v2.1 federation even though federation itself
      is a v2 non-goal.
    promoted_to_phase: 0
    status: NORMATIVE TEXT LANDED 2026-05-13 — spec/v2.0/SPECIFICATION.md §23 Agent Identity Lifecycle. Mirror sync (tailor-app PACT_SPECIFICATION.md) pending — folded into PR #1616.
    inputs:
      - issue #13 Q7
      - federation_constraints (this document)
    deliverables:
      - "[DONE] spec/v2.0/SPECIFICATION.md §23 Agent Identity Lifecycle — 23.1 what an agentId is (server-side, persistent, federation-portable URN), 23.2 the agent↔operator binding, 23.3 cooperative operator transfer, 23.4 hostile/non-cooperative recovery (M-of-N + abandoned-agent reset, time-locked dispute window), 23.5 event types, 23.6 conformance, 23.7 open questions"
      - "[DONE] spec/v2.0/schemas/agent-identity.json — agentId form (urn:pact:agent: or DID), transfer attestation, recovery-quorum enrollment, recovery attestation, abandonment; listed in Appendix A.2"
      - "[DONE] Cooperative operator-transfer flow: outgoing signs → incoming countersigns → server rotates binding without changing agentId (§23.3)"
      - "[DONE] Hostile transfer (AloomU sovereignty case): M-of-N recovery quorum + abandoned-agent reset; time-locked dispute window (default 72h); §23.4"
      - "[DONE] Event types: pact.agent.transferred, .identity-rotated, .recovery-initiated, .recovered, .abandoned (§23.5)"
      - "[DONE] agentId URN format (urn:pact:agent:{opaque} or DID) — portable in form, server-local in v2.0; federation resolution protocol deferred to v2.1 (§23.1, §23.7)"
    open_questions:
      - Agent identity portable across PACT servers? (Yes per federation_constraints, but transfer protocol TBD)
      - Trust-decay rules for transferred identities
      - M-of-N quorum size — implementation-defined or spec-fixed minimum?

  - id: T8
    name: Weight & type semantic contract (attached resources) — MOVED OUT OF v2 CORE
    decision_status: D2=B (2026-05-12) — NOT a v2 core track. Ships as a separate Tailor extension spec. v2 plan retains this entry as a cross-reference only.
    rationale: Closes #13 Q5, Q3, Q4. Documents what `--weight` and `--type` do at protocol layer vs documentary metadata.
    inputs:
      - issue #13 Q3, Q4, Q5
    deliverables_now_owned_by: Tailor extension spec (separate repo/doc — TBD location)
    deliverables:
      - "[Tailor ext] Resource Composition (attached resources, weight, type)"
      - "[Tailor ext] Decision: weight/type protocol-enforced (e.g. Mandatory blocks merge until satisfied) OR purely documentary"
      - "[Tailor ext] Share-link visibility rules for attached resources"
      - "[Tailor ext] Whether `--section` can target attached resources or only root"
    notes: |
      Per D2=B: document composition is Tailor-domain-specific. PACT v2 core
      stays lean. If transaction/fact resources later need composition
      primitives, design then as a v2.x addition. AloomU's #13 Q3-Q5 will be
      answered in the Tailor extension, not v2 core.

  - id: T9
    name: Conformance test suite (full coverage) + IMPLEMENTERS.md
    rationale: |
      Closes #13 Q8. Public conformance suite + canonical implementers guide
      so prospects can verify "PACT is actually an open standard."

      Rev2: The conformance SCAFFOLD (test-vector format, CI hook, directory
      structure) ships in phase 0 under T10. T9 in phase 3 expands the
      scaffold to full coverage across every track's deliverables.
    inputs:
      - issue #13 Q8
      - AloomU charter offer to PR docs/IMPLEMENTERS.md
      - T10 conformance scaffold (phase 0)
    deliverables:
      - docs/IMPLEMENTERS.md (registry of known impls, conformance level claimed, contact)
      - spec/v2.0/conformance/ — full black-box test suite per track
      - Self-certification badge in implementer profiles
      - Backward-compat tests: v1.1-client-against-v2-server forward-compat suite (rev2)
    conformance_impact:
      core: implementations claiming Core MUST pass Core conformance suite
      extended: implementations claiming Extended MUST pass Core + Extended suite

  - id: T10
    name: Schema hygiene, cross-reference cleanup & conformance scaffold
    rationale: |
      Spec hygiene + phase-0 conformance foundation. Tests should ship WITH
      normative text (T1, T2), not be retrofitted in phase 3. T10 lays the
      scaffold; T9 expands to full coverage later.
    inputs:
      - conversation 2026-05-12 (defects spotted + cold-eye review)
    deliverables:
      - "[DONE] v2.0 schemas use $id paths matching their version dir (/v2.0/) — fixed in the collapse commit"
      - "[DONE] v1.1 errata — promoted to spec/v1.1/ERRATA.md (E1 phantom §15/§16 refs, E2 stale schema $id paths); README v1.1 row links it; issue #15 closed"
      - "[DONE] Conformance scaffold: spec/v2.0/conformance/ directory + README + test-vector-format.yaml; .github/workflows/conformance.yml CI hook (scaffold checks + YAML-parse gate on every spec/ PR); validate.yml updated to validate v2.0 schemas (was v1.2)"
      - "[PARTIAL] spec/v2.0/conformance/core/join.yaml — first real test vector (Core: invite-token join + pact.agent.joined event). T1/T2/T7-specific smoke tests (authorization_proof verification, agent transfer) STILL TODO"
      - Real conformance runner (HTTP record/replay + event-sequence assertions) replacing the parse-only CI step — STILL TODO (T9 expands this)
      - Resource-type registry section (formalise v1.1 §14.3) — STILL TODO
      - JSON Schema bumped to 2020-12 (currently draft-07) — STILL TODO
      - Event-log retention policy — STILL TODO (minimum retention OR explicit "implementation-defined with audit-trail warning"; partially addressed by §17.10 GDPR/RTBF text which states events are protocol-integrity records)
    conformance_impact: none for protocol behaviour; the T10 scaffold + CI gate are now live

  - id: T11
    name: Reference CLI/MCP coverage (rev2 — new track)
    rationale: |
      @pact-protocol/cli and @pact-protocol/mcp are reference clients — the
      thing people install to actually use PACT. They're a first-class
      deliverable, not an implementers-guide footnote. Every new endpoint
      added by T3/T4/T5 needs CLI + MCP coverage before v2 ships.
    inputs:
      - cli/ and mcp/ packages (currently v1.1.0, not published — issue #5)
      - All track endpoints (T1, T3, T4, T5)
    deliverables:
      - @pact-protocol/cli updated to cover all v2 endpoints
      - @pact-protocol/mcp updated likewise (same primitives as MCP tools)
      - Version bump to v2.0.0
      - npm publish unblocked (closes issue #5 dependency)
      - CLI surface contract test in T9 suite
    conformance_impact:
      core: reference CLI demonstrates Core compliance for client-side
      extended: reference CLI supports Extended primitives optionally

phases:
  # Rev2 reordering. T7 promoted to phase 0; T10 expanded with conformance
  # scaffold; T11 added in phase 2.
  # D1-D6 ALL RESOLVED 2026-05-12 — phase 0 unblocked, phase 1/2 gates met.

  - phase: 0
    name: Foundation (identity, authorization, attestation, hygiene + conformance scaffold)
    status: UNBLOCKED 2026-05-12 (D1=A, D4=A, D5=A, D6=A resolved)
    parallel: [T1, T2, T7, T10]
    prerequisite: v1.2 → v2 branch collapse (D1=A) — see next_actions N4
    gate: |
      - T1 normative text approved by Knox; uses W3C DIDs (did:web + did:key required) per D6=A; defines Authorization-Required tier per D4=A
      - T7 identity model settled (Sessions and push-delivery depend on it); identity URNs designed for future federation
      - T10 conformance scaffold operational; smoke tests run on every PR
      - T2 voice-biometric blocked on HMAN PR #3 (carved out if it slips — R2)

  - phase: 1
    name: New primitives (Sessions, push, service accounts)
    parallel: [T3, T4, T5]
    gate: |
      - T3 Mandate primitive RFC opened (#14, 14-day window to 2026-05-26), design converged before normative text
      - T3 ships peer-to-peer Sessions with opt-in facilitator per D5=A; Mandate is normative-track per D3=A (demotable before v2 freeze if review finds it unstable)
      - T3, T4 normative text passes conformance smoke tests from T10 scaffold

  - phase: 2
    name: Operational gaps + reference clients
    parallel: [T6, T11]   # T8 removed from v2 core per D2=B — ships as separate Tailor extension spec
    gate: |
      - D2 resolved (B) — T8 attached-resource model is NOT v2 core; lives in a Tailor extension repo/spec. v2 plan tracks it only as a cross-reference.
      - T11 reference CLI/MCP covers all v2 endpoints; npm publish unblocked (#5)

  - phase: 3
    name: Compliance & launch
    parallel: [T9]
    gate: at least 2 implementations (Tailor + AloomU) pass full Core conformance suite

conformance_levels_v2:
  core:
    must:
      - All v1.1 Core primitives (join, leave, intent, constrain, propose, object, escalate, done, poll)
      - Event sourcing
      - Objection-based / silence-as-consent merge
      - At least one resource type (document by default)
    may:
      - authorization_proof (ignore if unsupported)
      - Sessions
      - Push delivery
      - Service-account auth
  extended:
    must:
      - All Core requirements
      - Information barriers + graduated disclosure
      - Mediated communication
      - At least one attestation type from §18
      - authorization_proof verification when present
    should:
      - Sessions support
      - Push delivery
      - Service-account auth
  authorization_required:
    must:
      - All Extended requirements
      - Reject cross-organisation messages lacking valid authorization_proof
      - HumanPrincipal strictly-1:1 enforcement (reject proofs claiming a principal spans multiple humans)
      - Credential registry + revocation propagation

deprecations:
  - target: spec/v0.3, spec/v0.4
    action: Legacy, no further updates, retained for citation stability
  - target: schemas with $id paths pointing to /v0.4/
    action: Fixed forward in v2; v1.1 schemas remain frozen per AGENTS.md
  - target: spec/v1.1 §15/§16 phantom references in preamble
    action: Errata note in spec/v1.1/README.md (do not back-fill — AGENTS.md frozen-versions rule)
  - target: tailor tap CLI overlap (issue #6)
    action: Resolved by T5 service-account auth + T11 @pact-protocol/cli npm publish (#5)

migration_v1_1_to_v2:
  breaking_changes: []
  additive_changes:
    - authorization_proof envelope on all messages (OPTIONAL at Core)
    - Sessions mode (alternative to resource mode; both supported)
    - Push delivery (additive endpoint set)
    - Service-account auth (additive endpoint set)
    - Conformance tier "Authorization-Required" (new, opt-in)
  client_compat: v1.1 clients work against v2 servers at Core level without modification
  server_compat: v2 servers accept v1.1 request shapes; respond with v2 fields v1.1 agents may ignore
  test_coverage: T9 includes a v1.1-client-against-v2-server forward-compat suite (rev2)

risks:
  - id: R1
    risk: v1.2-draft and v2 diverge if v1.2 is promoted to stable separately
    mitigation: Skip v1.2-stable; jump v1.1-stable → v2-stable; v1.2 branch becomes v2 working branch
    decision_needed: D1
  - id: R2
    risk: HMAN PR #3 (voice-biometric) slips, blocking T2 normative text
    mitigation: Ship voice-biometric as Extended-tier optional; not on Core critical path
  - id: R3
    risk: T3 Sessions design grows into a 6-month track and delays the rest
    mitigation: If Sessions can't converge in 8 weeks, split to spec/v2.1 addendum
  - id: R4
