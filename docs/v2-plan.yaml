  - id: D3
    question: Sessions (T3) — is the Mandate primitive normative in v2, or ship in v2.1 as an addendum?
    owner: Knox
    blocks: [T3]
    phase: 1
    note: Sharpened in rev2. Feature opt-in vs Extended is settled (opt-in at Core, SHOULD at Extended). Real decision is whether Mandate ships at all in v2.
    resolved: A — Mandate normative in v2 (D5 resolved cleanly); demotable before v2 freeze if T3 review finds it unstable
  - id: D4
    question: Authorization-Required tier — define in v2 or defer to v2.1?
    owner: Knox
    blocks: [T1]
    phase: 0
    resolved: A — define Authorization-Required as a normative conformance tier in v2 even with no launch implementation satisfying it yet
  - id: D5
    question: Sessions — peer-to-peer with opt-in facilitator role, OR always-mediated (separate MediatedSession resource type)? (rev2 — promoted from T3 open_questions; load-bearing)
    owner: Knox
    blocks: [T3]
    phase: 0
    recommendation: opt-in facilitator. Keeps Mandate primitive minimal. If mediator-mandatory case is needed later, ship MediatedSession in v2.1 as a separate resource type.
    resolved: A — peer-to-peer by default with opt-in facilitator role; always-mediated MediatedSession parked as a v2.1 candidate
  - id: D6
    question: Adopt W3C DIDs as principal identity layer, OR stay with simpler principal URI scheme? (rev2 — charter-level external-standards commitment)
    owner: Knox
    blocks: [T1, T7]
    phase: 0
    note: Both paths viable. DIDs give cross-server resolution for free (good for v2.1 federation) but commit PACT to W3C DID method ecosystem (adoption surface, dependency on external standard maturity). Simpler URI scheme is lighter but requires hand-rolling federation primitives in v2.1.
    resolved: A — adopt W3C DIDs; did:web + did:key required at v2; other DID methods optional

