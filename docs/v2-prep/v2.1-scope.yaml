  predecessor:
    stable: v2.0.3
    note: >
      v2.0 shipped 14 May 2026 (tag v2.0.0) with §19-22 marked RESERVED
      (SPECIFICATION.md line ~1966). v2.0.1/.2/.3 are inline patches against
      stable v2.0 (cold-eye audit, adversarial A1-A10/S1-S3, fabric
